# Deploy apenas do servidor WebSocket na Railway
#
# 1. railway login && railway init (ou liga este repositório a um projeto novo só para o WS)
# 2. Na Railway: New Service → mesmo repo; em Settings não uses "Root Directory" a menos que ajustes os caminhos
# 3. Variáveis opcionais: WS_HISTORY_LIMIT
# 4. A Railway define PORT automaticamente — não sobrescrevas
# 5. No frontend (.env.local), define NEXT_PUBLIC_WS_URL=wss://<teu-dominio>.up.railway.app
#
# Se no mesmo repositório também fizeres deploy do Next.js, cria outro serviço na Railway com outro start/build (ex.: npm run build && npm start).

[build]
builder = "NIXPACKS"
# Só instala na fase "install"; aqui não repetir pnpm (evita mounts extra do Next na fase build)
buildCommand = "true"

[deploy]
startCommand = "pnpm run start:ws"
restartPolicyType = "ON_FAILURE"
